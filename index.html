<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Bilbao 3D REAL</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  padding: 0;
}

#info {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px;
  font-family: sans-serif;
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="cesiumContainer"></div>
<div id="info">Bilbao REAL 3D - carga mundo</div>

<script>

// 🌍 VISOR BASE (ESTABLE)
const viewer = new Cesium.Viewer("cesiumContainer", {
  terrainProvider: Cesium.createWorldTerrain(),
  imageryProvider: new Cesium.IonImageryProvider({ assetId: 2 }),
  timeline: false,
  animation: false,
  baseLayerPicker: false,
  geocoder: false,
  navigationHelpButton: false,
  sceneModePicker: false
});

// 🏙️ edificios reales (OpenStreetMap 3D)
viewer.scene.primitives.add(
  Cesium.createOsmBuildings()
);

// 📍 BILBAO (posición fija correcta)
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(-2.935, 43.263, 2000),
  orientation: {
    heading: 0,
    pitch: -0.85,
    roll: 0
  }
});

// 🌤️ iluminación realista
viewer.scene.globe.enableLighting = true;

// 🔄 fuerza render estable
viewer.scene.requestRenderMode = false;

</script>

</body>
</html>
