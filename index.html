<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Bilbao REAL 3D</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}
</style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
// 🌍 VISOR CESIUM (CONFIGURACIÓN CORRECTA)
const viewer = new Cesium.Viewer("cesiumContainer", {

  // 🗺️ MAPA BASE (esto evita el "espacio vacío")
  imageryProvider: new Cesium.IonImageryProvider({
    assetId: 2
  }),

  // 🌍 TERRENO REAL
  terrainProvider: Cesium.Terrain.fromWorldTerrain(),

  animation: false,
  timeline: false,
  baseLayerPicker: false,
  geocoder: false,
  navigationHelpButton: false
});

// 🏙️ EDIFICIOS REALES 3D
viewer.scene.primitives.add(
  Cesium.createOsmBuildings()
);

// 📍 BILBAO REAL
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(-2.935, 43.263, 1200),
  orientation: {
    heading: 0,
    pitch: -0.8,
    roll: 0
  }
});

// 🌤️ mejorar iluminación (evita pantalla “vacía”)
viewer.scene.globe.enableLighting = true;

</script>

</body>
</html>
